name: Veille IA quotidienne

on:
  #schedule:
  #  - cron: '0 6 * * 1-5'  # 7h Paris, du lundi au vendredi seulement
  workflow_dispatch:          # bouton "Run" manuel sur GitHub

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
jobs:
  veille:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Charger la mémoire sources.json
        uses: actions/cache@v4
        with:
          path: sources.json
          key: sources-cache-${{ github.run_number }}
          restore-keys: sources-cache-

      - name: Lancer l'agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python agent.py

      - name: Sauvegarder le rapport HTML
        uses: actions/upload-artifact@v4
        with:
          name: rapport-${{ github.run_id }}
          path: rapport_*.html
          retention-days: 30

      - name: Sauvegarder sources.json mis à jour
        uses: actions/cache/save@v4
        with:
          path: sources.json
          key: sources-cache-${{ github.run_number }}
